<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaiboWorld 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        /* 登录界面 */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        
        .login-box {
            background: rgba(255,255,255,0.1);
            border: 2px solid #D4AF37;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            width: 400px;
        }
        
        .login-box h1 {
            color: #D4AF37;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .login-box input {
            width: 100%;
            padding: 15px;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            margin-bottom: 20px;
        }
        
        .login-box button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D4AF37 0%, #B8960F 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .login-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }
        
        /* 主界面 */
        .admin-container {
            display: none;
            padding: 20px;
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .admin-header h1 {
            color: #D4AF37;
            font-size: 24px;
        }
        
        .admin-header button {
            padding: 10px 20px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
        }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            border: 1px solid #D4AF37;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 36px;
            font-weight: bold;
            color: #D4AF37;
        }
        
        .stat-card .label {
            color: #aaa;
            margin-top: 5px;
        }
        
        /* 玩家列表 */
        .players-section {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            color: #D4AF37;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
        }
        
        .search-box input {
            padding: 10px 15px;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            width: 250px;
        }
        
        .search-box button {
            padding: 10px 20px;
            background: #D4AF37;
            border: none;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
        }
        
        .players-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .players-table th,
        .players-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .players-table th {
            color: #D4AF37;
            font-weight: bold;
        }
        
        .players-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .players-table .actions {
            display: flex;
            gap: 5px;
        }
        
        .players-table .btn {
            padding: 5px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn-view { background: #3498db; color: #fff; }
        .btn-edit { background: #27ae60; color: #fff; }
        .btn-ban { background: #e74c3c; color: #fff; }
        .btn-unban { background: #9b59b6; color: #fff; }
        
        /* 玩家详情弹窗 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #D4AF37;
            border-radius: 16px;
            padding: 30px;
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #D4AF37;
        }
        
        .modal-header h3 {
            color: #D4AF37;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }
        
        .detail-item {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
        }
        
        .detail-item .label {
            color: #aaa;
            font-size: 12px;
            margin-bottom: 5px;
        }
        
        .detail-item .value {
            color: #D4AF37;
            font-size: 18px;
            font-weight: bold;
        }
        
        /* 编辑表单 */
        .edit-form {
            display: grid;
            gap: 15px;
        }
        
        .edit-form label {
            color: #aaa;
            font-size: 14px;
        }
        
        .edit-form input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
        }
        
        .edit-form button {
            padding: 15px;
            background: linear-gradient(135deg, #D4AF37 0%, #B8960F 100%);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* 系统公告 */
        .announcement-section {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        
        .announcement-form {
            display: flex;
            gap: 10px;
        }
        
        .announcement-form input {
            flex: 1;
            padding: 12px;
            border: 1px solid #D4AF37;
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }
        
        .announcement-form button {
            padding: 12px 30px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        
        /* 标签页 */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid #D4AF37;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: #D4AF37;
            color: #000;
        }
        
        /* 状态标签 */
        .status-online {
            color: #27ae60;
        }
        
        .status-offline {
            color: #e74c3c;
        }
        
        .status-banned {
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.2);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #aaa;
        }
        
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #D4AF37;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- 登录界面 -->
    <div class="login-container" id="loginContainer">
        <div class="login-box">
            <h1>🎮 SaiboWorld 管理后台</h1>
            <input type="password" id="adminPassword" placeholder="请输入管理员密码">
            <button onclick="adminLogin()">登 录</button>
            <p style="color: #888; margin-top: 20px; font-size: 12px;">
                默认密码：admin123
            </p>
        </div>
    </div>
    
    <!-- 主界面 -->
    <div class="admin-container" id="adminContainer">
        <div class="admin-header">
            <h1>🎮 SaiboWorld 管理后台</h1>
            <button onclick="adminLogout()">退出登录</button>
        </div>
        
        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="value" id="totalPlayers">0</div>
                <div class="label">总玩家数</div>
            </div>
            <div class="stat-card">
                <div class="value" id="onlinePlayers">0</div>
                <div class="label">在线玩家</div>
            </div>
            <div class="stat-card">
                <div class="value" id="totalSaves">0</div>
                <div class="label">存档数量</div>
            </div>
            <div class="stat-card">
                <div class="value" id="todayActive">0</div>
                <div class="label">今日活跃</div>
            </div>
        </div>
        
        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('players')">玩家管理</div>
            <div class="tab" onclick="switchTab('saves')">存档管理</div>
            <div class="tab" onclick="switchTab('announcement')">系统公告</div>
        </div>
        
        <!-- 玩家管理 -->
        <div class="players-section" id="playersSection">
            <div class="section-header">
                <h2>玩家列表</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索玩家名称...">
                    <button onclick="searchPlayers()">搜索</button>
                    <button onclick="refreshPlayers()" style="background: #27ae60;">刷新</button>
                </div>
            </div>
            <table class="players-table">
                <thead>
                    <tr>
                        <th>玩家ID</th>
                        <th>玩家名称</th>
                        <th>等级</th>
                        <th>战力</th>
                        <th>最后活跃</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="playersList">
                    <tr><td colspan="7" class="loading">加载中</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 存档管理 -->
        <div class="players-section" id="savesSection" style="display: none;">
            <div class="section-header">
                <h2>玩家存档</h2>
                <div class="search-box">
                    <input type="text" id="saveSearchInput" placeholder="搜索玩家名称...">
                    <button onclick="searchSaves()">搜索</button>
                    <button onclick="refreshSaves()" style="background: #27ae60;">刷新</button>
                </div>
            </div>
            <table class="players-table">
                <thead>
                    <tr>
                        <th>玩家ID</th>
                        <th>玩家名称</th>
                        <th>金币</th>
                        <th>修为</th>
                        <th>境界</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="savesList">
                    <tr><td colspan="7" class="loading">加载中</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 系统公告 -->
        <div class="announcement-section" id="announcementSection" style="display: none;">
            <h2 style="color: #D4AF37; margin-bottom: 20px;">发送系统公告</h2>
            <div class="announcement-form">
                <input type="text" id="announcementText" placeholder="输入公告内容...">
                <button onclick="sendAnnouncement()">发送公告</button>
            </div>
            
            <h3 style="color: #D4AF37; margin: 30px 0 15px;">快捷操作</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="btn btn-edit" onclick="sendPresetAnnouncement('🌟 全服双倍经验活动已开启！持续1小时')">双倍经验</button>
                <button class="btn btn-edit" onclick="sendPresetAnnouncement('💎 全服掉率翻倍活动已开启！')">掉率翻倍</button>
                <button class="btn btn-edit" onclick="sendPresetAnnouncement('🔧 服务器维护通知，请及时保存游戏')">维护通知</button>
                <button class="btn btn-edit" onclick="sendPresetAnnouncement('🎉 新版本已更新，快来体验新功能！')">新版本</button>
                <button class="btn btn-ban" onclick="sendPresetAnnouncement('⚠️ 注意：禁止使用外挂，违者封号')">防外挂</button>
            </div>
        </div>
    </div>
    
    <!-- 玩家详情弹窗 -->
    <div class="modal" id="playerModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>玩家详情</h3>
                <button class="modal-close" onclick="closeModal('playerModal')">&times;</button>
            </div>
            <div id="playerDetail">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>
    
    <!-- 编辑玩家弹窗 -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>编辑玩家</h3>
                <button class="modal-close" onclick="closeModal('editModal')">&times;</button>
            </div>
            <div class="edit-form" id="editForm">
                <!-- 动态填充 -->
            </div>
        </div>
    </div>

    <script>
        // Supabase 配置
        const SUPABASE_URL = 'https://br-pious-smee-86f29586.supabase2.aidap-global.cn-beijing.volces.com';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJleHAiOjMzNTQzNjEzMTQsInJvbGUiOiJhbm9uIn0.3r376T6STLiARqoqCwNCeMdgUG9BDt9Hg3mZAtxfVw0';
        
        let supabaseClient = null;
        let currentPlayer = null;
        
        // 管理员密码（实际项目应该从服务器验证）
        const ADMIN_PASSWORD = 'admin123';
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            // 检查登录状态
            const isLoggedIn = sessionStorage.getItem('adminLoggedIn');
            if (isLoggedIn === 'true') {
                showAdminPanel();
            }
        });
        
        // 管理员登录
        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (password === ADMIN_PASSWORD) {
                sessionStorage.setItem('adminLoggedIn', 'true');
                showAdminPanel();
            } else {
                alert('密码错误！');
            }
        }
        
        // 退出登录
        function adminLogout() {
            sessionStorage.removeItem('adminLoggedIn');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('adminContainer').style.display = 'none';
        }
        
        // 显示管理面板
        function showAdminPanel() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('adminContainer').style.display = 'block';
            refreshPlayers();
            loadStats();
        }
        
        // 加载统计数据
        async function loadStats() {
            try {
                // 获取在线玩家数（5分钟内活跃）
                const fiveMinutesAgo = new Date(Date.now() - 5 * 60 * 1000).toISOString();
                const { count: onlineCount } = await supabaseClient
                    .from('online_players')
                    .select('*', { count: 'exact', head: true })
                    .gte('last_active', fiveMinutesAgo);
                
                document.getElementById('onlinePlayers').textContent = onlineCount || 0;
                
                // 获取总玩家数
                const { count: totalCount } = await supabaseClient
                    .from('online_players')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('totalPlayers').textContent = totalCount || 0;
                
                // 获取存档数
                const { count: savesCount } = await supabaseClient
                    .from('player_saves')
                    .select('*', { count: 'exact', head: true });
                
                document.getElementById('totalSaves').textContent = savesCount || 0;
                
                // 获取今日活跃
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const { count: todayCount } = await supabaseClient
                    .from('online_players')
                    .select('*', { count: 'exact', head: true })
                    .gte('last_active', today.toISOString());
                
                document.getElementById('todayActive').textContent = todayCount || 0;
                
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        // 刷新玩家列表
        async function refreshPlayers() {
            const tbody = document.getElementById('playersList');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">加载中</td></tr>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('online_players')
                    .select('*')
                    .order('last_active', { ascending: false })
                    .limit(100);
                
                if (error) throw error;
                
                renderPlayers(data || []);
            } catch (e) {
                console.error('加载玩家失败:', e);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#e74c3c;">加载失败</td></tr>';
            }
        }
        
        // 渲染玩家列表
        function renderPlayers(players) {
            const tbody = document.getElementById('playersList');
            
            if (players.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;">暂无玩家</td></tr>';
                return;
            }
            
            tbody.innerHTML = players.map(p => {
                const lastActive = new Date(p.last_active);
                const now = new Date();
                const isOnline = (now - lastActive) < 5 * 60 * 1000;
                const isBanned = p.banned;
                
                return `
                    <tr>
                        <td style="font-size:12px;color:#888;">${p.id.substring(0, 20)}...</td>
                        <td style="color:#D4AF37;font-weight:bold;">${p.player_name}</td>
                        <td>Lv.${p.level}</td>
                        <td style="color:#4ecdc4;">${(p.power || 0).toLocaleString()}</td>
                        <td style="font-size:12px;">${lastActive.toLocaleString()}</td>
                        <td>
                            ${isBanned ? '<span class="status-banned">已封禁</span>' : 
                              (isOnline ? '<span class="status-online">● 在线</span>' : '<span class="status-offline">○ 离线</span>')}
                        </td>
                        <td class="actions">
                            <button class="btn btn-view" onclick="viewPlayer('${p.id}')">详情</button>
                            <button class="btn btn-edit" onclick="editPlayer('${p.id}')">编辑</button>
                            ${isBanned ? 
                                `<button class="btn btn-unban" onclick="unbanPlayer('${p.id}')">解封</button>` :
                                `<button class="btn btn-ban" onclick="banPlayer('${p.id}')">封禁</button>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }
        
        // 搜索玩家
        async function searchPlayers() {
            const keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                refreshPlayers();
                return;
            }
            
            const tbody = document.getElementById('playersList');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">搜索中</td></tr>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('online_players')
                    .select('*')
                    .ilike('player_name', `%${keyword}%`)
                    .order('last_active', { ascending: false });
                
                if (error) throw error;
                renderPlayers(data || []);
            } catch (e) {
                console.error('搜索失败:', e);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#e74c3c;">搜索失败</td></tr>';
            }
        }
        
        // 查看玩家详情
        async function viewPlayer(playerId) {
            try {
                // 获取在线信息
                const { data: playerData } = await supabaseClient
                    .from('online_players')
                    .select('*')
                    .eq('id', playerId)
                    .single();
                
                // 获取存档信息
                const { data: saveData } = await supabaseClient
                    .from('player_saves')
                    .select('*')
                    .eq('id', playerId)
                    .single();
                
                currentPlayer = playerData;
                
                const detail = document.getElementById('playerDetail');
                detail.innerHTML = `
                    <div class="detail-grid">
                        <div class="detail-item">
                            <div class="label">玩家ID</div>
                            <div class="value" style="font-size:12px;">${playerId}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">玩家名称</div>
                            <div class="value">${playerData?.player_name || '未知'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">等级</div>
                            <div class="value">Lv.${playerData?.level || 1}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">战力</div>
                            <div class="value">${(playerData?.power || 0).toLocaleString()}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">最后活跃</div>
                            <div class="value" style="font-size:14px;">${playerData?.last_active ? new Date(playerData.last_active).toLocaleString() : '未知'}</div>
                        </div>
                        <div class="detail-item">
                            <div class="label">注册时间</div>
                            <div class="value" style="font-size:14px;">${playerData?.created_at ? new Date(playerData.created_at).toLocaleString() : '未知'}</div>
                        </div>
                    </div>
                    
                    <h4 style="color:#D4AF37;margin:20px 0 15px;">存档数据</h4>
                    ${saveData ? `
                        <div class="detail-grid">
                            <div class="detail-item">
                                <div class="label">金币</div>
                                <div class="value">${(saveData.save_data?.player?.silver || 0).toLocaleString()}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">钻石</div>
                                <div class="value">${saveData.save_data?.player?.spirit || 0}</toLocaleString></div>
                            </div>
                            <div class="detail-item">
                                <div class="label">修为</div>
                                <div class="value">${(saveData.save_data?.player?.xiuyuan || 0).toLocaleString()}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">境界</div>
                                <div class="value">${saveData.save_data?.realmLevel || 1}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">存档时间</div>
                                <div class="value" style="font-size:14px;">${new Date(saveData.updated_at).toLocaleString()}</div>
                            </div>
                            <div class="detail-item">
                                <div class="label">同步状态</div>
                                <div class="value">${saveData.sync_enabled ? '✓ 已同步' : '○ 未同步'}</div>
                            </div>
                        </div>
                    ` : '<p style="color:#888;text-align:center;">暂无存档数据</p>'}
                `;
                
                document.getElementById('playerModal').classList.add('active');
            } catch (e) {
                console.error('获取玩家详情失败:', e);
                alert('获取玩家详情失败');
            }
        }
        
        // 编辑玩家
        async function editPlayer(playerId) {
            try {
                const { data: saveData } = await supabaseClient
                    .from('player_saves')
                    .select('*')
                    .eq('id', playerId)
                    .single();
                
                currentPlayer = { id: playerId, saveData };
                
                const form = document.getElementById('editForm');
                form.innerHTML = `
                    <input type="hidden" id="editPlayerId" value="${playerId}">
                    
                    <label>玩家名称</label>
                    <input type="text" id="editName" value="${saveData?.save_data?.player?.name || ''}">
                    
                    <label>金币</label>
                    <input type="number" id="editSilver" value="${saveData?.save_data?.player?.silver || 0}">
                    
                    <label>钻石</label>
                    <input type="number" id="editSpirit" value="${saveData?.save_data?.player?.spirit || 0}">
                    
                    <label>修为</label>
                    <input type="number" id="editXiuyuan" value="${saveData?.save_data?.player?.xiuyuan || 0}">
                    
                    <label>境界等级 (1-15)</label>
                    <input type="number" id="editRealm" value="${saveData?.save_data?.realmLevel || 1}" min="1" max="15">
                    
                    <button onclick="savePlayerEdit()">保存修改</button>
                `;
                
                document.getElementById('editModal').classList.add('active');
            } catch (e) {
                console.error('获取玩家数据失败:', e);
                alert('该玩家暂无存档数据');
            }
        }
        
        // 保存玩家编辑
        async function savePlayerEdit() {
            const playerId = document.getElementById('editPlayerId').value;
            const name = document.getElementById('editName').value;
            const silver = parseInt(document.getElementById('editSilver').value) || 0;
            const spirit = parseInt(document.getElementById('editSpirit').value) || 0;
            const xiuyuan = parseInt(document.getElementById('editXiuyuan').value) || 0;
            const realmLevel = parseInt(document.getElementById('editRealm').value) || 1;
            
            try {
                // 先获取现有存档
                const { data: existingSave } = await supabaseClient
                    .from('player_saves')
                    .select('save_data')
                    .eq('id', playerId)
                    .single();
                
                let saveData = existingSave?.save_data || { player: {} };
                
                // 更新数据
                saveData.player = {
                    ...saveData.player,
                    name: name,
                    silver: silver,
                    spirit: spirit,
                    xiuyuan: xiuyuan
                };
                saveData.realmLevel = realmLevel;
                
                // 保存到数据库
                const { error } = await supabaseClient
                    .from('player_saves')
                    .upsert({
                        id: playerId,
                        player_name: name,
                        save_data: saveData,
                        sync_enabled: true,
                        updated_at: new Date().toISOString()
                    });
                
                if (error) throw error;
                
                // 同时更新在线玩家表
                await supabaseClient
                    .from('online_players')
                    .update({ player_name: name })
                    .eq('id', playerId);
                
                alert('保存成功！');
                closeModal('editModal');
                refreshPlayers();
                
            } catch (e) {
                console.error('保存失败:', e);
                alert('保存失败: ' + e.message);
            }
        }
        
        // 封禁玩家
        async function banPlayer(playerId) {
            if (!confirm('确定要封禁该玩家吗？')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('online_players')
                    .update({ banned: true })
                    .eq('id', playerId);
                
                if (error) throw error;
                alert('已封禁');
                refreshPlayers();
            } catch (e) {
                console.error('封禁失败:', e);
                alert('封禁失败');
            }
        }
        
        // 解封玩家
        async function unbanPlayer(playerId) {
            try {
                const { error } = await supabaseClient
                    .from('online_players')
                    .update({ banned: false })
                    .eq('id', playerId);
                
                if (error) throw error;
                alert('已解封');
                refreshPlayers();
            } catch (e) {
                console.error('解封失败:', e);
                alert('解封失败');
            }
        }
        
        // 切换标签页
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            document.getElementById('playersSection').style.display = tab === 'players' ? 'block' : 'none';
            document.getElementById('savesSection').style.display = tab === 'saves' ? 'block' : 'none';
            document.getElementById('announcementSection').style.display = tab === 'announcement' ? 'block' : 'none';
            
            if (tab === 'saves') {
                refreshSaves();
            }
        }
        
        // 刷新存档列表
        async function refreshSaves() {
            const tbody = document.getElementById('savesList');
            tbody.innerHTML = '<tr><td colspan="7" class="loading">加载中</td></tr>';
            
            try {
                const { data, error } = await supabaseClient
                    .from('player_saves')
                    .select('*')
                    .order('updated_at', { ascending: false })
                    .limit(100);
                
                if (error) throw error;
                renderSaves(data || []);
            } catch (e) {
                console.error('加载存档失败:', e);
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#e74c3c;">加载失败</td></tr>';
            }
        }
        
        // 渲染存档列表
        function renderSaves(saves) {
            const tbody = document.getElementById('savesList');
            
            if (saves.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#888;">暂无存档</td></tr>';
                return;
            }
            
            tbody.innerHTML = saves.map(s => `
                <tr>
                    <td style="font-size:12px;color:#888;">${s.id.substring(0, 20)}...</td>
                    <td style="color:#D4AF37;font-weight:bold;">${s.player_name}</td>
                    <td style="color:#ffd700;">${(s.save_data?.player?.silver || 0).toLocaleString()}</td>
                    <td style="color:#4ecdc4;">${(s.save_data?.player?.xiuyuan || 0).toLocaleString()}</td>
                    <td>${s.save_data?.realmLevel || 1}</td>
                    <td style="font-size:12px;">${new Date(s.updated_at).toLocaleString()}</td>
                    <td class="actions">
                        <button class="btn btn-view" onclick="viewPlayer('${s.id}')">详情</button>
                        <button class="btn btn-edit" onclick="editPlayer('${s.id}')">编辑</button>
                    </td>
                </tr>
            `).join('');
        }
        
        // 发送系统公告
        function sendAnnouncement() {
            const text = document.getElementById('announcementText').value.trim();
            if (!text) {
                alert('请输入公告内容');
                return;
            }
            
            // 这里需要实现实际推送逻辑
            // 可以通过 WebSocket 或轮询机制推送给所有在线玩家
            alert('公告已发送：' + text);
            document.getElementById('announcementText').value = '';
        }
        
        // 发送预设公告
        function sendPresetAnnouncement(text) {
            document.getElementById('announcementText').value = text;
            sendAnnouncement();
        }
        
        // 关闭弹窗
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        // 回车登录
        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                adminLogin();
            }
        });
    </script>
</body>
</html>
