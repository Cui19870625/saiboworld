<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>登录测试</title>
</head>
<body>
    <div id="loginModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);display:flex;align-items:center;justify-content:center;z-index:999999;">
      <div style="text-align:center;">
        <div style="font-size:32px;font-weight:bold;color:#8A8A9A;margin-bottom:40px;">SAIBOWORLD 测试</div>
        <div style="width:280px;margin:0 auto;">
          <input id="loginUser" type="text" placeholder="用户名" style="width:100%;height:42px;background:#1a1a2e;border:1px solid #8A8A9A;border-radius:4px;padding:0 14px;font-size:14px;margin-bottom:12px;outline:none;color:#fff;" value="player1">
          <input id="loginPwd" type="password" placeholder="密码" style="width:100%;height:42px;background:#1a1a2e;border:1px solid #8A8A9A;border-radius:4px;padding:0 14px;font-size:14px;margin-bottom:20px;outline:none;color:#fff;" value="123456">
          <div style="display:flex;gap:12px;margin-bottom:12px;">
            <button onclick="doLogin()" style="flex:1;height:42px;background:linear-gradient(135deg, #8A8A9A 0%, #6A6A7A 100%);color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer;font-weight:bold;">登录</button>
          </div>
        </div>
      </div>
    </div>

    <script>
        console.log('Script loaded');
        
        window.doLogin = function() {
            alert('登录按钮被点击！');
            console.log('登录成功');
            
            // 隐藏登录框
            document.getElementById("loginModal").style.display = 'none';
            
            // 显示成功信息
            document.body.innerHTML = '<h1 style="color:white;text-align:center;margin-top:200px;">登录成功！</h1>';
        };
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOMContentLoaded');
            console.log('doLogin defined:', typeof window.doLogin);
        });
    </script>
</body>
</html>
